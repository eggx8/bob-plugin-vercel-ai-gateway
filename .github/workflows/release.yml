name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify release tag
        run: node -e "const v=require('./info.json').version; if (process.env.GITHUB_REF_NAME !== 'v' + v) throw new Error('Release tag must be v' + v)"
      - name: Verify repository
        run: pnpm run check
      - name: Rebuild package
        run: pnpm run package
      - name: Verify package is reproducible
        run: git diff --exit-code -- bobplugin
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" "bobplugin/vercel-ai-gateway_${GITHUB_REF_NAME#v}.bobplugin" --generate-notes --verify-tag
